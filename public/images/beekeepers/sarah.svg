<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="none"/>
  
  <!-- Beekeeper Body -->
  <g>
    <!-- Suit -->
    <path d="M50,80 Q50,60 70,60 H130 Q150,60 150,80 V140 Q150,150 130,150 H70 Q50,150 50,140 Z" fill="#fff" stroke="#000" stroke-width="3"/>
    <!-- Gloves -->
    <circle cx="40" cy="100" r="15" fill="#fff" stroke="#000" stroke-width="2"/>
    <circle cx="160" cy="100" r="15" fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- Boots -->
    <rect x="60" y="140" width="30" height="20" fill="#fff" stroke="#000" stroke-width="2"/>
    <rect x="110" y="140" width="30" height="20" fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- Head -->
    <circle cx="100" cy="40" r="25" fill="#ffe0bd" stroke="#000" stroke-width="2"/>
    <!-- Hat -->
    <rect x="75" y="15" width="50" height="25" fill="#fff" stroke="#000" stroke-width="2"/>
    <!-- Veil -->
    <path d="M75,40 Q100,10 125,40" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="75" y1="40" x2="75" y2="65" stroke="#000" stroke-width="2"/>
    <line x1="125" y1="40" x2="125" y2="65" stroke="#000" stroke-width="2"/>
    <!-- Face -->
    <circle cx="90" cy="35" r="3" fill="#000"/>
    <circle cx="110" cy="35" r="3" fill="#000"/>
    <path d="M90,45 Q100,55 110,45" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Hair -->
    <path d="M75,40 Q100,20 125,40" fill="#ffd1dc" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Accessories -->
  <circle cx="100" cy="80" r="8" fill="#ffeb3b"/> <!-- Smoker -->
  <rect x="85" y="65" width="30" height="20" fill="#ff9800"/> <!-- Honey jar -->
</svg>